server:
  port: ${SERVER_PORT:8080}

spring:
  mvc:
    async:
      request-timeout: 600000
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/simple_ai_oj?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  model: ${DASHSCOPE_MODEL:qwen-plus}
  enable-search: ${DASHSCOPE_ENABLE_SEARCH:true}
  base-url: ${DASHSCOPE_BASE_URL:}
